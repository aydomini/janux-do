name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '可选：把 DMG 上传到指定 GitHub Release tag，例如 v0.2.15. 留空则只上传 artifact。'
        required: false
        type: string
      upload_release:
        description: '是否上传到 GitHub Release'
        required: true
        default: false
        type: boolean
permissions:
  contents: write

concurrency:
  group: macos-dmg-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.9'
  APP_NAME: 'JANUX DO'
  DMG_NAME: 'JANUX-DO-macOS.dmg'
  DMG_VOLNAME: 'JANUX DO'

jobs:
  build_macos_dmg:
    name: Build macOS DMG
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure unsigned macOS build
        run: |
          mkdir -p apple
          cat > apple/Local.xcconfig <<'EOF'
          FLUXDO_APPLE_CODE_SIGN_IDENTITY_MACOSX =
          FLUXDO_APPLE_CODE_SIGN_STYLE = Manual
          FLUXDO_APPLE_CODE_SIGNING_ALLOWED = NO
          EOF

      - name: Prepare project
        run: dart tool/project_prep.dart app

      - name: Analyze project scope
        run: |
          flutter analyze --no-pub \
            lib/widgets/common/error_view.dart \
            lib/utils/error_utils.dart \
            lib/forum_adapter \
            lib/providers/forum_provider.dart \
            lib/pages/javbus \
            lib/theme \
            lib/main.dart \
            test/forum_adapter \
            test/providers/forum_provider_test.dart \
            test/pages/javbus/javbus_pages_test.dart \
            test/theme \
            test/utils/error_utils_forum_exception_test.dart

      - name: Test project scope
        run: |
          flutter test --no-pub \
            test/forum_adapter \
            test/providers/forum_provider_test.dart \
            test/pages/javbus \
            test/theme \
            test/utils/error_utils_forum_exception_test.dart

      - name: Build macOS release app
        run: dart tool/flutterw.dart build macos --release

      - name: Verify macOS app bundle
        run: |
          APP_PATH="build/macos/Build/Products/Release/${APP_NAME}.app"
          EXECUTABLE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP_PATH/Contents/Info.plist")"
          BUNDLE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleName' "$APP_PATH/Contents/Info.plist")"
          test -d "$APP_PATH"
          test -n "$EXECUTABLE_NAME"
          test -f "$APP_PATH/Contents/MacOS/$EXECUTABLE_NAME"
          echo "Bundle name: $BUNDLE_NAME"
          echo "Executable: $EXECUTABLE_NAME"

      - name: Package DMG
        run: |
          set -euo pipefail
          APP_PATH="build/macos/Build/Products/Release/${APP_NAME}.app"
          STAGE_DIR="dist/dmg-stage"
          DMG_PATH="dist/${DMG_NAME}"
          rm -rf dist
          mkdir -p "$STAGE_DIR"
          cp -R "$APP_PATH" "$STAGE_DIR/"
          ln -s /Applications "$STAGE_DIR/Applications"
          hdiutil create \
            -volname "$DMG_VOLNAME" \
            -srcfolder "$STAGE_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"
          hdiutil verify "$DMG_PATH"
          shasum -a 256 "$DMG_PATH" | tee "${DMG_PATH}.sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: janux-do-macos-dmg
          path: |
            dist/${{ env.DMG_NAME }}
            dist/${{ env.DMG_NAME }}.sha256
          if-no-files-found: error
          overwrite: true

      - name: Resolve release tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release }}
        id: release
        run: |
          tag="${{ inputs.release_tag }}"
          if [ -z "$tag" ]; then
            tag="${{ github.ref_name }}"
          fi
          if [ -z "$tag" ]; then
            echo 'release_tag is required when upload_release=true and current ref has no name.' >&2
            exit 64
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Upload DMG to GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: JANUX DO ${{ steps.release.outputs.tag }}
          files: |
            dist/${{ env.DMG_NAME }}
            dist/${{ env.DMG_NAME }}.sha256
          fail_on_unmatched_files: true
          make_latest: false
